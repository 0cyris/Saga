<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Saga Visual Smoke Harness</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        html,
        body {
            min-height: 100%;
            margin: 0;
            background: #111;
            color: #f1ead8;
            font-family: Arial, sans-serif;
        }

        .saga-smoke-stage {
            position: fixed;
            inset: 0;
            overflow: hidden;
            background:
                linear-gradient(135deg, rgba(18, 12, 18, 0.96), rgba(9, 12, 18, 0.96)),
                radial-gradient(circle at 20% 20%, rgba(185, 139, 54, 0.16), transparent 32%);
        }

        .saga-smoke-note {
            position: fixed;
            left: 24px;
            bottom: 18px;
            max-width: 520px;
            color: #cfc5ad;
            font-size: 13px;
            line-height: 1.45;
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <div class="saga-smoke-stage" aria-hidden="true"></div>
    <div class="saga-smoke-note">
        Local harness for Saga visual smoke checks. It stubs the SillyTavern context and renders the real runtime shelf.
    </div>

    <script>
        const smokeContext = {
            extensionSettings: {},
            chatMetadata: {},
            chat: [
                { is_user: true, mes: '### Context: Harry Potter, 1991-09-01. Harry arrives at Hogwarts.' },
                { is_user: false, mes: 'The Great Hall is bright with candles while first-years wait to be sorted.' },
            ],
            characters: [],
            groups: [],
            name1: 'User',
            name2: 'Narrator',
            saveMetadata() {},
            saveSettingsDebounced() {},
            setExtensionPrompt() {},
            eventSource: { on() {} },
            event_types: {
                GENERATE_BEFORE_COMBINE_PROMPTS: 'generate_before_combine_prompts',
                GENERATION_STARTED: 'generation_started',
                GENERATION_ENDED: 'generation_ended',
                CHAT_CHANGED: 'chat_changed',
            },
            getPresetManager() {
                return {
                    getAllPresets: () => [],
                    getCompletionPresetByName: () => null,
                    readPresetExtensionField: () => null,
                    savePreset: async () => {},
                    getSelectedPreset: () => '',
                    getSelectedPresetName: () => '',
                    selectPreset: () => {},
                };
            },
        };

        window.SillyTavern = {
            getContext: () => smokeContext,
            setExtensionPrompt: () => {},
        };
        window.toastr = {
            success: (message) => console.log('[toastr:success]', message),
            info: (message) => console.log('[toastr:info]', message),
            warning: (message) => console.warn('[toastr:warning]', message),
            error: (message) => console.error('[toastr:error]', message),
        };
        window.registerSlashCommand = () => {};
        window.__sagaSmokeContext = smokeContext;
    </script>
