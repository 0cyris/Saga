name: loredeck-builder build check

on:
  pull_request:
    paths:
      - '.claude/skills/loredeck-builder/**'
      - 'tools/loredeck/**'
      - 'docs/loredecks/**'
      - 'content/loredecks/hp-core/**'
      - 'src/loredecks/**'
      - 'src/lorecards/**'
      - 'plugins/loredeck-builder/**'
      - 'tools/scripts/test-loredeck-*.mjs'
  push:
    branches:
      - main
    paths:
      - '.claude/skills/loredeck-builder/**'
      - 'tools/loredeck/**'
      - 'docs/loredecks/**'
      - 'content/loredecks/hp-core/**'
      - 'src/loredecks/**'
      - 'src/lorecards/**'
      - 'plugins/loredeck-builder/**'
      - 'tools/scripts/test-loredeck-*.mjs'

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Run the Loredeck Builder CLI test plan
        run: |
          node tools/scripts/test-loredeck-workshop-state.mjs
          node tools/scripts/test-loredeck-evidence-store.mjs
          node tools/scripts/test-loredeck-cli-health-cross-deck-tags.mjs
          node tools/scripts/test-loredeck-cli-health-parity.mjs
          node tools/scripts/test-loredeck-cli-package-roundtrip.mjs
          node tools/scripts/test-loredeck-cli-conformance.mjs
          node tools/scripts/test-loredeck-review-artifacts.mjs

      - name: Build the .skill bundle from source of truth
        run: |
          node plugins/loredeck-builder/scripts/sync-from-repo.mjs
          node plugins/loredeck-builder/scripts/build-skill-file.mjs

      - name: Verify the built bundle (self-contained, strict-clean health)
        run: node tools/scripts/test-loredeck-plugin-bundle.mjs
