name: loredeck-builder drift check

on:
  pull_request:
    paths:
      - '.claude/skills/loredeck-builder/**'
      - 'tools/loredeck/**'
      - 'docs/loredecks/**'
      - 'content/loredecks/hp-core/**'
      - 'src/loredecks/**'
      - 'src/lorecards/**'
      - 'plugins/loredeck-builder/**'
  push:
    branches:
      - main
    paths:
      - '.claude/skills/loredeck-builder/**'
      - 'tools/loredeck/**'
      - 'docs/loredecks/**'
      - 'content/loredecks/hp-core/**'
      - 'src/loredecks/**'
      - 'src/lorecards/**'
      - 'plugins/loredeck-builder/**'

jobs:
  check-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Regenerate plugin bundle from source of truth
        run: node plugins/loredeck-builder/scripts/sync-from-repo.mjs

      - name: Fail if the checked-in bundle is stale
        run: git diff --exit-code -- plugins/loredeck-builder

      - name: How to fix
        if: failure()
        run: |
          echo "plugins/loredeck-builder/ is out of sync with its source (.claude/skills/loredeck-builder, tools/loredeck, docs/loredecks, content/loredecks/hp-core, src/loredecks, src/lorecards)."
          echo "Run: node plugins/loredeck-builder/scripts/sync-from-repo.mjs"
          echo "Then commit the result."
