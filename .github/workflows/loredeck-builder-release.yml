name: loredeck-builder release

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Regenerate plugin bundle from source of truth
        run: node plugins/loredeck-builder/scripts/sync-from-repo.mjs

      - name: Fail if the checked-in bundle is stale
        run: git diff --exit-code -- plugins/loredeck-builder

      - name: Build .skill file
        run: node plugins/loredeck-builder/scripts/build-skill-file.mjs

      - name: Upload as workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: loredeck-builder-skill
          path: plugins/loredeck-builder/dist/loredeck-builder.skill

      - name: Attach to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" plugins/loredeck-builder/dist/loredeck-builder.skill --clobber
