<div id="saga_settings" class="saga-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>SAGA</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">

            <!-- Runtime handoff -->
            <div class="inline-drawer">
                <div class="inline-drawer-toggle inline-drawer-header">
                    <i class="fa-solid fa-window-restore" style="margin-right: 8px; opacity: 0.7;"></i>
                    <b>Runtime Window</b>
                    <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
                </div>
                <div class="inline-drawer-content">
                    <div class="flex-container flexFlowColumn gap-1">
                        <p style="font-size: 0.85em; opacity: 0.72; margin-bottom: 4px;">
                            SAGA: Fandom Loresystem. During roleplay, use the runtime window for mode, injection toggles, scanning, generation, review, lore editing, provider setup, and theme settings.
                        </p>
                        <div class="saga-runtime-window-actions">
                            <button id="saga_open_window" type="button" class="menu_button interactable"
                                title="Open the SAGA runtime window.">
                                <i class="fa-solid fa-up-right-from-square"></i> Open SAGA Window
                            </button>
                            <button id="saga_reset_window" type="button" class="menu_button interactable"
                                title="Reset the SAGA runtime window to its safe default position, size, tab, shelf state, and section dropdown defaults.">
                                <i class="fa-solid fa-arrows-rotate"></i> Reset Window
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
